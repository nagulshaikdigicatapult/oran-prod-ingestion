name: Portal Monitor

on:
  schedule:
    - cron: "15 2 * * *"
  workflow_dispatch: {}

permissions:
  contents: read

jobs:
  monitor:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install tools
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install ruff bandit pip-audit
          python -m playwright install --with-deps chromium

      - name: Lint + security
        run: |
          ruff check .
          bandit -q -r scripts -ll

      - name: Fetch live portal manifest
        run: |
          python scripts/browser/fetch_manifest_live.py

      - name: Normalize + diff (CI safe)
        env:
          ORAN_SKIP_CATALOG: "1"
        run: |
          python scripts/01_normalize_manifest.py --in manifests/raw/manifest.live.json
          python scripts/update_from_portal.py manifests/raw/manifest.live.json

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: portal-monitor-artifacts
          path: |
            manifests/raw/manifest.live.json
            manifests/processed/normalized_manifest.json
            reports/portal_diff.latest.json
            reports/portal_status.latest.json
