name: Portal monitor (daily, no PR)

on:
  schedule:
    - cron: "15 2 * * *"
  workflow_dispatch: {}

permissions:
  contents: read

jobs:
  monitor:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install CI tooling
        run: |
          python -m pip install --upgrade pip
          pip install ruff bandit pip-audit

      - name: Lint + security
        run: |
          ruff --version
          ruff check . --fix
          ruff check .
          bandit -q -r scripts -ll

      - name: Monitor run (CI-safe: no catalog, no downloads)
        env:
          ORAN_SKIP_CATALOG: "1"
        run: |
          python scripts/01_normalize_manifest.py
          python scripts/update_from_portal.py manifests/raw/manifest.latest.json

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: portal-monitor-artifacts
          path: |
            manifests/raw/manifest.latest.json
            manifests/processed/normalized_manifest.json
            reports/portal_diff.latest.json
            reports/portal_status.latest.json

      - name: Summary
        run: |
          echo "=== Portal monitor summary ==="
          cat reports/portal_diff.latest.json || true
