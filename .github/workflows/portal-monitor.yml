name: Portal monitor (daily, no PR)

on:
  schedule:
    # Daily at 02:15 UTC
    - cron: "15 2 * * *"
  workflow_dispatch: {}

permissions:
  contents: read

jobs:
  monitor:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install CI tooling
        run: |
          python -m pip install --upgrade pip
          pip install ruff bandit pip-audit

      - name: Lint + security
        run: |
          ruff --version
          ruff check . --fix
          ruff check .
          bandit -q -r scripts -ll

      - name: Monitor run (CI-safe: no catalog, no downloads)
        run: |
          python scripts/01_normalize_manifest.py
          ORAN_SKIP_CATALOG=1 python scripts/update_from_portal.py manifests/raw/manifest.latest.json

      - name: Detect changes
        id: changes
        run: |
          if git diff --quiet; then
            echo "changed=false" >> "$GITHUB_OUTPUT"
            echo "No changes detected."
          else
            echo "changed=true" >> "$GITHUB_OUTPUT"
            echo "Changes detected:"
            git status --porcelain
          fi

      - name: Upload artifacts (when changed)
        if: steps.changes.outputs.changed == 'true'
        uses: actions/upload-artifact@v4
        with:
          name: portal-monitor-artifacts
          path: |
            manifests/raw/manifest.latest.json
            manifests/processed/normalized_manifest.json
            reports/portal_diff.latest.json
            reports/portal_status.latest.json

      - name: Summary
        run: |
          echo "=== Portal monitor summary ==="
          if [ -f reports/portal_diff.latest.json ]; then
            python - <<'PY'
import json
from pathlib import Path
d=json.loads(Path("reports/portal_diff.latest.json").read_text())
print("portal_count=", d.get("portal_count"))
print("inventory_count=", d.get("inventory_count"))
print("new_ids_count=", d.get("new_ids_count"))
print("missing_ids_count=", d.get("missing_ids_count"))
PY
          else
            echo "No portal diff report found (unexpected)."
          fi
