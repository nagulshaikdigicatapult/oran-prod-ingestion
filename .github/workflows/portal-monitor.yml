name: Portal monitor (daily, no PR)

on:
  schedule:
    - cron: "15 2 * * *"
  workflow_dispatch: {}

permissions:
  contents: read

jobs:
  monitor:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install tooling
        run: |
          python -m pip install --upgrade pip
          pip install ruff bandit pip-audit

      - name: Lint + security (quick)
        run: |
          ruff check .
          bandit -q -r scripts -ll

      - name: Run pipeline (no network downloads)
        run: |
          python scripts/01_normalize_manifest.py
          python scripts/10_generate_catalog_from_inventory.py
          python scripts/update_from_portal.py manifests/raw/manifest.latest.json
          python scripts/tools/00_ci_guardrails.py

      - name: Detect changes
        id: changes
        run: |
          if git diff --quiet; then
            echo "changed=false" >> $GITHUB_OUTPUT
            echo "No changes detected."
          else
            echo "changed=true" >> $GITHUB_OUTPUT
            echo "Changes detected."
            git status --porcelain
          fi

      - name: Upload artifacts (when changed)
        if: steps.changes.outputs.changed == 'true'
        uses: actions/upload-artifact@v4
        with:
          name: portal-monitor-artifacts
          path: |
            manifests/raw/manifest.latest.json
            manifests/processed/normalized_manifest.json
            inventory/catalog.latest.json
            inventory/catalog.latest.csv
            reports/portal_diff.latest.json
            reports/portal_status.latest.json

      - name: Summary
        run: |
          echo "=== Portal monitor summary ==="
          jq -r '.portal_count as $p | .inventory_count as $i | .missing_ids_count as $m | "portal_count=\($p) inventory_count=\($i) missing=\($m)"' reports/portal_diff.latest.json || true
